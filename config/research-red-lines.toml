# Hard constraints for every analysis workflow.

[analysis]
local_analysis_enabled = false
aggregation_only = true
ai_analysis_required = true
model_knowledge_last_resort = true
model_knowledge_requires_low_confidence_label = true

[evidence_escalation]
ordered_sources = [
  "local_source_snapshots",
  "akshare",
  "http_requests",
  "playwright",
  "model_knowledge",
]
skip_confirmed_steps = true
prevent_duplicate_source_collection = true

[report_output]
format = "html"
markdown_allowed = false
require_complete_document = true

[report_focus]
max_lookback_days = 30
primary = [
  "industry_trends",
  "policy",
  "supply_demand",
  "technology_iteration",
  "capacity",
  "orders",
  "pricing",
  "upstream_downstream",
  "company_announcements",
]
forbidden = [
  "technical_analysis",
  "trading_strategy",
  "buy_sell_points",
]

[collection_normalization]
ai_assistance_allowed = true
analysis_forbidden = true
preserve_raw_snapshot = true
allowed_operations = [
  "extract",
  "split",
  "deduplicate",
  "label",
  "quality_score",
]

[workflow_isolation]
source_reports_use_general_snapshots_only = true
source_reports_forbid_research_task_context = true
source_reports_forbid_stock_skill_injection = true
source_reports_selected_channels_only = true
research_tasks_may_read_general_snapshots = true
research_tasks_may_read_all_source_snapshots = true
research_tasks_may_read_source_reports = true
research_tasks_may_collect_scoped_evidence = true
research_tasks_refresh_stale_general_sources = true
