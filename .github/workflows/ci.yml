name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit public repository contents
        run: python scripts/audit_public_repo.py

  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall backend tests
      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare Compose environment
        run: cp .env.example .env
      - name: Validate Compose configuration
        run: docker compose --env-file .env config --quiet
      - name: Build web image
        run: docker build -f docker/frontend.Dockerfile -t alphadesk-web:ci .
      - name: Build API image
        run: docker build -f docker/backend.Dockerfile -t alphadesk-api:ci .
      - name: Build WeRSS runtime image
        run: docker build -f docker/werss.Dockerfile -t alphadesk-werss:ci .
      - name: Start Compose stack
        env:
          ALPHADESK_WEB_IMAGE: alphadesk-web:ci
          ALPHADESK_API_IMAGE: alphadesk-api:ci
          ALPHADESK_WERSS_IMAGE: alphadesk-werss:ci
        run: docker compose --env-file .env up -d --no-build
      - name: Wait for Web readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env logs --tail=200
          exit 1
      - name: Verify browser entry
        run: curl --fail --silent --show-error http://127.0.0.1:8080/ | grep -q '<div id="app"></div>'
      - name: Show Compose status
        if: always()
        run: docker compose --env-file .env ps
      - name: Stop Compose stack
        if: always()
        run: docker compose --env-file .env down -v
