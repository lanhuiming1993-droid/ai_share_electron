name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/alphadesk-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: API image metadata
        id: api-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/alphadesk-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: WeRSS runtime image metadata
        id: werss-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/alphadesk-werss
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Publish web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: Publish API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Publish WeRSS runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/werss.Dockerfile
          push: true
          tags: ${{ steps.werss-meta.outputs.tags }}
          labels: ${{ steps.werss-meta.outputs.labels }}

      - name: Package Compose deployment bundle
        run: |
          mkdir -p "alphadesk-${GITHUB_REF_NAME}"
          cp compose.yaml compose.admin.yaml .env.example VERSION README.md SECURITY.md CHANGELOG.md THIRD_PARTY_NOTICES.md "alphadesk-${GITHUB_REF_NAME}/"
          cp -R scripts docs LICENSES "alphadesk-${GITHUB_REF_NAME}/"
          sed -i "s/^ALPHADESK_VERSION=.*/ALPHADESK_VERSION=${GITHUB_REF_NAME#v}/" "alphadesk-${GITHUB_REF_NAME}/.env.example"
          tar -czf "alphadesk-compose-${GITHUB_REF_NAME}.tar.gz" "alphadesk-${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: alphadesk-compose-${{ github.ref_name }}.tar.gz
