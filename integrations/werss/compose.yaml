services:
  werss:
    image: ghcr.io/rachelos/we-mp-rss@sha256:53912fcb3d523d1e640adcb7066cc18123f00e9510882a7982d0991f3113845f
    container_name: alphadesk-werss
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      GATHER.CONTENT: "True"
      GATHER.CONTENT_AUTO_CHECK: "True"
      GATHER.CONTENT_AUTO_INTERVAL: "15"
      RSS_FULL_CONTEXT: "True"
    volumes:
      - ../../data/werss:/app/data
